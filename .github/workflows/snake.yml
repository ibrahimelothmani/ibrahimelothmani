# Place this file at: .github/workflows/snake.yml (in the ibrahimelothmani/ibrahimelothmani repo)
# One-time setup: commit this file, then run it once from the Actions tab (or wait for the schedule).
# It generates an animated SVG of your contribution graph and pushes it to the `output` branch,
# which is what the <img> tag in README.md under "GitHub Activity" points to.

name: generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"   # once a day
  workflow_dispatch: {}    # allows manual run from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: ibrahimelothmani
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: push output to "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
